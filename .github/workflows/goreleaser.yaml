name: GoReleaser

on:
  push:
    tags:
      - v*

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Validate Release
    outputs:
      COMMIT_SHA: ${{ steps.commit-sha.outputs.commit_sha }}
      FLAGS: ${{ steps.set-flags.outputs.flags }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Commit SHA
        id: commit-sha
        run: echo "commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Validate Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # This step validates that the tag is an official release
        id: set-flags
        run: |
          prerelease=$(gh release view ${{ github.ref_name }} --json isPrerelease | jq -r '.isPrerelease')
          
          version="${{ github.ref_name }}"
          
          if [ "$prerelease" == "true" ]; then
          
            echo "flags=--nightly" >> $GITHUB_ENV
            echo "flags=--nightly" >> "$GITHUB_OUTPUT"
          
            # if it does not contain 'rc', it's invalid
            if [[ "${{ github.ref_name }}" != *-rc* ]]; then
                echo "Tag is a prerelease, but the tag name does not contain -rc"
                exit 1
            fi
          
            version="${version#v}"  # Remove the "v" prefix from the tag
            version="${version%%-rc.*}" # Remove the "-rc.*" suffix from the tag
          else
            echo "flags=" >> $GITHUB_ENV
            echo "flags=" >> "$GITHUB_OUTPUT"
            node -e "if (!/^v\d+\.\d+\.\d+$/.test('${{ github.ref_name }}')) { console.error('Invalid version format. Expected: vX.Y.Z'); process.exit(1); }"
            version="${version#v}"  # Remove the "v" prefix from the tag
          fi
          
          thor_version=$(cat cmd/thor/VERSION)
          if [ "$version" != "$thor_version" ]; then
            echo "VERSION file ($thor_version) does not match tag ($version)"
            exit 1
          fi
          
          api_version=$(grep -o 'version: [0-9.]*' api/doc/thor.yaml | awk '{print $2}')
          if [ "$version" != "$api_version" ]; then
              echo "API spec version ($api_version) does not match Thor version ($version)"
              exit 1
          fi
          
  prepare:
    runs-on: ${{ matrix.runs-on }}
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs-on: ubuntu-latest
            go-arch: amd64
            go-os: linux
          - runs-on: ubuntu-24.04-arm
            go-arch: arm64
            go-os: linux
          - runs-on: macos-latest
            go-arch: arm64
            go-os: darwin
          - runs-on: windows-latest
            go-arch: amd64
            go-os: windows
    outputs:
      THOR_VERSION: ${{ steps.env.outputs.THOR_VERSION }}
      DISCO_VERSION: ${{ steps.env.outputs.DISCO_VERSION }}
      COPYRIGHT_YEAR: ${{ steps.env.outputs.COPYRIGHT_YEAR }}

    permissions:
      contents: read
      packages: write

    environment: docker-publish
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.24

      - uses: docker/setup-qemu-action@v3
        if: matrix.go-os == 'linux'
      - uses: docker/setup-buildx-action@v3
        if:  matrix.go-os == 'linux'

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - shell: bash
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
      - uses: actions/cache@v4
        with:
          path: dist/${{ matrix.go-os }}_${{ matrix.go-arch }}
          key: ${{ matrix.go-os }}-${{ needs.validate.outputs.COMMIT_SHA }}${{ needs.validate.outputs.FLAGS }}-${{ matrix.go-arch }}

      - name: Set Up Env
        id: env
        shell: bash
        run: |
          THOR_VERSION=$(cat ./cmd/thor/VERSION)
          echo "THOR_VERSION=$THOR_VERSION" >> "$GITHUB_OUTPUT"
          DISCO_VERSION=$(cat ./cmd/disco/VERSION)
          echo "DISCO_VERSION=$DISCO_VERSION" >> "$GITHUB_OUTPUT"
          COPYRIGHT_YEAR=$(date +'%Y')
          echo "COPYRIGHT_YEAR=$COPYRIGHT_YEAR" >> "$GITHUB_OUTPUT"

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser-pro
          version: latest
          args: release --clean --split --verbose ${{ needs.validate.outputs.FLAGS }} ${{ (matrix.go-os == 'darwin' || matrix.go-os == 'windows') && '--skip docker' || ''}}
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GORELEASER_KEY: ${{ secrets.GORELEASER_KEY }}
          GOOS: ${{ matrix.go-os }}
          GOARCH: ${{ matrix.go-arch }}
          THOR_VERSION: ${{ steps.env.outputs.THOR_VERSION }}
          DISCO_VERSION: ${{ steps.env.outputs.DISCO_VERSION }}
          COPYRIGHT_YEAR: ${{ steps.env.outputs.COPYRIGHT_YEAR }}
          REPOSITORY: ${{ github.repository }}

      - shell: bash
        run: |
          ls -laR ./dist

  release:
    runs-on: ubuntu-latest
    needs:
      - prepare
      - validate
    env:
      DOCKER_CLI_EXPERIMENTAL: "enabled"
    environment: docker-publish

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: sigstore/cosign-installer@v3.9.2
      - uses: anchore/sbom-action/download-syft@v0.20.5
      - name: ghcr-login
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-go@v6
        with:
          go-version: stable

      - shell: bash
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
      - uses: actions/cache@v4
        with:
          path: dist/linux_amd64
          key: linux-${{ needs.validate.outputs.COMMIT_SHA }}${{ needs.validate.outputs.FLAGS }}-amd64
      - uses: actions/cache@v4
        with:
          path: dist/linux_arm64
          key: linux-${{ needs.validate.outputs.COMMIT_SHA }}${{ needs.validate.outputs.FLAGS }}-arm64
      - uses: actions/cache@v4
        with:
          path: dist/darwin_arm64
          key: darwin-${{ needs.validate.outputs.COMMIT_SHA }}${{ needs.validate.outputs.FLAGS }}-arm64
      - uses: actions/cache@v4
        with:
          path: dist/windows_amd64
          key: windows-${{ needs.validate.outputs.COMMIT_SHA }}${{ needs.validate.outputs.FLAGS }}-amd64
          enableCrossOsArchive: true
      - name: Debug
        run: ls -laR ./dist

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser-pro
          version: latest
          args: continue --merge --verbose ${{ needs.validate.outputs.FLAGS }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GORELEASER_KEY: ${{ secrets.GORELEASER_KEY }}
          GOOS: ${{ matrix.go-os }}
          GOARCH: ${{ matrix.go-arch }}
          THOR_VERSION: ${{ needs.prepare.outputs.THOR_VERSION }}
          DISCO_VERSION: ${{ needs.prepare.outputs.DISCO_VERSION }}
          COPYRIGHT_YEAR: ${{ needs.prepare.outputs.COPYRIGHT_YEAR }}
          REPOSITORY: ${{ github.repository }}
