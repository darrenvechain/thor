name: GoReleaser

on:
  push:
    tags:
      - v*

jobs:
  prepare:
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs-on: ubuntu-latest
            go-arch: amd64
            go-os: linux
          - runs-on: ubuntu-24.04-arm
            go-arch: arm64
            go-os: linux
          - runs-on: macos-latest
            go-arch: arm64
            go-os: darwin
          - runs-on: windows-latest
            go-arch: amd64
            go-os: windows
    outputs:
      THOR_VERSION: ${{ steps.env.outputs.THOR_VERSION }}
      DISCO_VERSION: ${{ steps.env.outputs.DISCO_VERSION }}
      COPYRIGHT_YEAR: ${{ steps.env.outputs.COPYRIGHT_YEAR }}

    environment: docker-publish
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.24

      - if: contains(github.ref, 'rc')
        shell: bash
        run: |
          echo "flags=--nightly" >> $GITHUB_ENV

      - uses: docker/setup-qemu-action@v3
        if: matrix.go-os == 'linux'
      - uses: docker/setup-buildx-action@v3
        if:  matrix.go-os == 'linux'
      - name: ghcr-login
        uses: docker/login-action@v3
        if: matrix.go-os == 'linux'
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - shell: bash
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
      - uses: actions/cache@v4
        with:
          path: dist/${{ matrix.go-os }}_${{ matrix.go-arch }}
          key: ${{ matrix.go-os }}-${{ env.sha_short }}${{ env.flags }}-${{ matrix.go-arch }}

      - name: Set Up Env
        id: env
        shell: bash
        run: |
          THOR_VERSION=$(cat ./cmd/thor/VERSION)
          echo "THOR_VERSION=$THOR_VERSION" >> "$GITHUB_OUTPUT"
          DISCO_VERSION=$(cat ./cmd/disco/VERSION)
          echo "DISCO_VERSION=$DISCO_VERSION" >> "$GITHUB_OUTPUT"
          COPYRIGHT_YEAR=$(date +'%Y')
          echo "COPYRIGHT_YEAR=$COPYRIGHT_YEAR" >> "$GITHUB_OUTPUT"

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser-pro
          version: latest
          args: release --clean --split --verbose ${{ env.flags }} ${{ (matrix.go-os == 'darwin' || matrix.go-os == 'windows') && '--skip docker' || ''}}
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GORELEASER_KEY: ${{ secrets.GORELEASER_KEY }}
          GOOS: ${{ matrix.go-os }}
          GOARCH: ${{ matrix.go-arch }}
          THOR_VERSION: ${{ steps.env.outputs.THOR_VERSION }}
          DISCO_VERSION: ${{ steps.env.outputs.DISCO_VERSION }}
          COPYRIGHT_YEAR: ${{ steps.env.outputs.COPYRIGHT_YEAR }}
          REPOSITORY: ${{ github.repository }}

      - shell: bash
        run: |
          ls -laR ./dist

  release:
    runs-on: ubuntu-latest
    needs: prepare
    env:
      DOCKER_CLI_EXPERIMENTAL: "enabled"
      flags: ""
    environment: docker-publish
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: sigstore/cosign-installer@v3.9.2
      - uses: anchore/sbom-action/download-syft@v0.20.5
      - name: ghcr-login
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-go@v6
        with:
          go-version: stable

      - if: contains(github.ref, 'rc')
        shell: bash
        run: |
          echo "flags=--nightly" >> $GITHUB_ENV

      - shell: bash
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
      - uses: actions/cache@v4
        with:
          path: dist/linux-amd64
          key: linux_${{ env.sha_short }}${{ env.flags }}-amd64
      - uses: actions/cache@v4
        with:
          path: dist/linux-arm64
          key: linux_${{ env.sha_short }}${{ env.flags }}-arm64
      - uses: actions/cache@v4
        with:
          path: dist/darwin
          key: darwin_${{ env.sha_short }}${{ env.flags }}-arm64
      - uses: actions/cache@v4
        with:
          path: dist/windows
          key: windows_${{ env.sha_short }}${{ env.flags }}-amd64
          enableCrossOsArchive: true

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser-pro
          version: latest
          args: continue --merge
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GORELEASER_KEY: ${{ secrets.GORELEASER_KEY }}
          GOOS: ${{ matrix.go-os }}
          GOARCH: ${{ matrix.go-arch }}
          THOR_VERSION: ${{ needs.prepare.outputs.THOR_VERSION }}
          DISCO_VERSION: ${{ needs.prepare.outputs.DISCO_VERSION }}
          COPYRIGHT_YEAR: ${{ needs.prepare.outputs.COPYRIGHT_YEAR }}
          REPOSITORY: ${{ github.repository }}
